            border-radius: 10px;
            font-size: 11px;

        // 1. AUTO REDIRECT SETELAH 2 MENIT 30 DETIK (150.000 milidetik)

        videoElement.load();

        // 3. REAL-TIME STATS INCREMENT
        setInterval(() => {
            let onlineEl = document.getElementById("onlineCount");
            let currentOnline = parseInt(onlineEl.innerText.replace(',', ''));
            let randomChange = Math.floor(Math.random() * 9) - 4; 
            onlineEl.innerText = (currentOnline + randomChange).toLocaleString();

            let watchingEl = document.getElementById("watchingCount");
            let currentWatching = parseInt(watchingEl.innerText.replace(',', ''));
            let randomWatch = Math.floor(Math.random() * 5) - 2;
            watchingEl.innerText = (currentWatching + randomWatch).toLocaleString();

        const fakeChats = [
            { user: "Michael", text: "typing..." },

            { user: "Joseph", text: "So fun! 🔥" },
            { user: "Evelyn", text: "Check DM please" },
            { user: "David", text: "Already joined! 💯" },
            { user: "Sarah", text: "The video is crazy 😂" }
        ];

        const chatContainer = document.getElementById("chatContainer");

        function addChatBubble() {
            const randomChat = fakeChats[Math.floor(Math.random() * fakeChats.length)];
            const bubble = document.createElement("div");
            bubble.className = "chat-bubble";
            bubble.innerHTML = `<div class="chat-user">${randomChat.user}</div><div class="chat-text">${randomChat.text}</div>`;
            
            chatContainer.appendChild(bubble);

            if (chatContainer.children.length > 3) {
                chatContainer.removeChild(chatContainer.children[0]);
            }

            setTimeout(() => {
                if (bubble.parentNode) {
                    bubble.parentNode.removeChild(bubble);
                }
            }, 4000);
        }

        setInterval(addChatBubble, 2500);

        // 5. FLOATING EMOJI ANIMATION
        const emojis = ["❤️", "🔥", "😍", "💋", "🎉", "⭐"];
        const reactionsContainer = document.getElementById("reactionsContainer");

        function spawnEmoji() {
            const emojiEl = document.createElement("div");
            emojiEl.className = "floating-emoji";
            emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = Math.random() * 30 + "px";
            
            reactionsContainer.appendChild(emojiEl);

            setTimeout(() => {
                emojiEl.remove();
            }, 3000);
        }

        setInterval(spawnEmoji, 800);
    </script>
